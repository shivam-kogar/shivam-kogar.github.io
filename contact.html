<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam Kogar - Contact</title>

    <!-- LaTeX-style font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <style>
        body {
            font-family: 'KaTeX_Main', 'Latin Modern Roman', serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        nav {
            position: absolute;
            top: 20px;
            right: 40px;
        }

        nav a {
            color: #000000;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        h1 {
            font-size: 2.3em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1em;
            color: #444;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        label {
            font-size: 0.95em;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: 'KaTeX_Main', 'Latin Modern Roman', serif;
            font-size: 1em;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid #000;
            outline: none;
            background: transparent;
        }

        input:focus, textarea:focus {
            border-bottom: 2px solid #000;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            font-family: 'KaTeX_Main', 'Latin Modern Roman', serif;
            font-size: 1em;
            border: 1px solid #000;
            background-color: #000;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #fff;
            color: #000;
        }

        .alt-contact {
            margin-top: 40px;
            font-size: 0.95em;
            color: #444;
        }

        .alt-contact a {
            color: #000;
            text-decoration: none;
        }

        .alt-contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h1>Contact Me</h1>
        <div class="subtitle">Feel free to reach out — I’d be happy to connect.</div>

        <form action="https://formspree.io/f/xreyjzag" method="POST">
            <div>
                <label for="name">Name</label><br>
                <input type="text" id="name" name="name" required>
            </div>

            <div>
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="message">Message</label><br>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
